body:
  text: 松溪道人無垢子何道全述門人賈道玄編集師行離浙遊歷淮楚至沭陽赤蓮湖真武堂遇舊道友高卧雲來訪師與徒衆和泥高戲曰這幾年無垢今番拖泥帶水師曰只知藕在泥中長不識蓮花離水開高曰藕與蓮花身性何比師曰藕者喻人之身也蓮花比心性也道人與常人一般應事乃方寸有異作詩曰虚空本不立纖塵外相非眞裏面真只知藕在淤泥長不識蓮花出水新師遊西渡黄河至湛首座庵與老僧坐話間有一僧來聽法老僧曰無法可說師曰此乃真說法也豈不聞金剛經云無法可說是名說法儒云視聽不用耳目卒不能逃耳目之用昔須菩提巖間宴坐諸天雨華曰我見尊者善說般若尊者曰我於般若未嘗說一字雨華曰尊者無說我亦無聞無說無聞乃真般若也雷祖經云欲聞至道至道深窈不在其他爾既欲聞無聞者是夫學道之人須是誠實柔弱默守方可入道僧又問中字師曰念頭起處謂之中此道家之中也釋云不思善不思惡正恁麽時那箇是自己本來面目此釋門之中也儒云喜怒哀樂之未發謂之中此儒門之中也汝宜思之師至崇寧菴有張菴主參師問曰桃核桃樹何者先有師曰只見園苑百花開不知皆賴陽和力乃一炁分真化而有此太極初判無相能生萬有無形能制有形是名象帝之先也菴主又問曰鷄卵鷄母何者先有師曰此皆一理菴主曰鷄卵有不生鷄者何也師曰譬如桃核懸於空中不着地土焉能發芽成樹乎文始經云諸核在土天地造化生芽芽長爲樹樹即開花花謝成果果又成核核復成芽芽復成樹核芽相生不知變化幾億萬樹化化無有窮盡若懸核在虚空不着邊傍不居土内天地雖大不能造化空中之核而生芽作樹且言雌卵得雄隂陽造化而生禽禽復生卵抱卵相生不知變化幾億萬禽無有窮盡若卵無雄隂陽雖妙不能變化此乃孤隂而無陽也古云純陽無雜爲仙隂陽相和成物純隂無陽爲鬼是也尹眞君云未干我者攝之以一息則變萬物於我五行孰能變之且如修行人於境物上要輕快過去一切諸縁不可滯着攝伏住則萬物被我所拘若着物則隨物所化便被隂陽所拘隨念遷轉即墮輪迴流浪生死也若有絲毫念起便須降伏果能念滅情忘萬縁頓息五行豈能變化隂陽怎生陶鑄如空中核似無雄卵不在六合之内復歸太初之先兹非小可也師至邳州佑德觀有秀聚峰和尚參師問念佛二字師曰何必遠求自己的佛如何不認假如請將西方佛來却把你自家佛放在何處汝不聞川老云若言他是佛自己却成魔道云身中自有眞元始何須心外覓天尊儒云吾身自有一太極也和尚再問曰請師開示念佛捷徑法門得見佛面師笑曰吾語汝古人云念佛一聲應一聲本來面目太分明無心杖子敲桃核直教驚動裏頭人此乃是說破佛之真面目也且念佛法門有三等一降魔二觀想三參究此三段俱不在念佛數珠上如初學念佛之人先須念佛降魔魔伏念滅方入法門若不如是枉勞神氣終不成功緊要降魔滅念念佛時不要絲毫念起將雜念作正要把頑心换佛心如若根基淺薄急换不過乃自思忖我乃是念佛之人何有此念此是業根如此自持自戒再將佛號慢慢舉起一聲至十聲或至百聲莫教雜念間斷有念即掃無念即舉先師云無念中念念中無念是也久久純熟自然有箇道理只要行住坐卧常常舉起不可間斷若心念不離動靜不忘直至不舉自舉無念自念方是得力處如此念佛後有善果若心惡念多口念心非此乃造業名曰佛口蛇心觀想念佛者行住坐卧語默動靜之間時刻念想不在出聲心不離佛佛不離心如子母相憶若境物上纔有動念即便攝景歸心以作觀想自己心中一尊真佛紫焰金容端坐於中巍然不動無時暫捨念念觀想或千百聲念念現前若遇逆境順境邪魔一齊掃蕩一心且觀且念阿彌陀佛作箇主宰如靠須彌山相似如急水中抱着橋柱不可放捨其魔自散其邪自正如若百年命終之時亦是如此一心把佛爲主心念不離自然不隨邪道若在生念佛刻刻不忘久久自有入頭處猛然拶着磕着得自己之彌陀千了百當此般念佛一聲强如千百聲罪消道長則本性自悟也參究念佛者須擇靜處節飲食厚氈褥寬衣結跏趺坐竪脊調氣屏除雜念然後將佛號輕輕舉起不在出聲默念一聲至百聲如有雜念重頭再舉直至百聲無間斷一聲聲參究意義念佛的是誰四大分張之時念佛的歸於何處安身立命且參且念時時不離行住坐卧中參念不可忘却窮根究本直須要箇明白直至不參自參不舉自舉日久月深猛然摸着自己鼻孔認着阿彌陀佛恁時一聲即登彼岸勝似念千萬億佛名數念珠耗氣也古云佛在靈山莫遠求靈山即在汝心頭人人有箇靈山塔好向靈山塔下修乃作頌一首曰西方有佛號阿彌只在心中人不知若肯念中無别念火坑變作白蓮池師至邳州有善士蘇德善參師請問養心二字師曰若要養心須是除垢止念念滅垢除心自清淨也再問養氣師曰稀言可以養氣再問會首二字師曰會者聚也能勸一切人作善修福一會上爲尊也以内言之養神煉氣燮理隂陽調和四象攢簇五行透過三關而朝天谷得三華聚頂五氣朝元會於泥丸故曰會首也乃作偈曰過失休言微細滴水成河不竭作福休言福多須防虧中補折福上更要加善惡念滅中更絶直待善惡兩忘恁時盡皆透徹師至宿遷縣㟃峿山七眞洞有善友劉伯通問動靜二字師作偈曰靜則自如動則差别一念歸家萬縁盡絶雲散青霄一輪皎潔照見本來不生不滅只這箇是休生枝節放下放下决烈决烈驀直便行有何可說若能敬信行之不謁復有心禪和尚參師請問本來面目是何物師作頌曰無形無影果難尋達者分明昩者沈直待皮膚脫落盡圓陀陀地一團金僧送扇與師乃作詩回贈二首這扇從來不耐秋金風纔起不能留勸汝從今能放下免得狂風亂捲愁又拳柄全憑掌握中收來放去快無窮提得起時須放下纔有清凉便莫風又送鞋與師乃作詩回贈金針玉線用工竒足下相將步步隨不履纖毫泥共水清清淨淨赴蓮池師至裕州仙翁觀聞蟬聲噪乃適興詠詩曰泥丸百轉用功多不覺翻身出糞窠抛棄從前殗穢殻緑揚獨占最高柯師在仙翁觀有蘇提點參師問清靜道德四字師曰靈府無事是清一念不生是靜寂然不動是道感而遂通是德初修之士靜則守志降心動則安人利物是也楊提點問學道有四事立如松走如風睡如弓語如鍾何也師乃作詩曰立志如松耐歲寒如風遇境莫遮欄掌握精神如搭箭休教失手再難還多言恐有傷人禍不語之時更是難從今向去如鍾鼓擊則聞聲住則安學道若依如此事有何煩惱有何歡猛然踏着來時路不覺黄糧夢自殘此四事分爲内外且初機之人先行外而後行内不可離也時值孟夏師適興作滿庭芳詞一首日月如梭光隂似箭不覺人老顔悛那時曾聽高柳噪新蟬今日又逢首夏欻忽間又早經年尋思起人生一世能有幾時堅空之字諸公聞早悟急忙下手猶是俄延勸疾速放下淨洗三田煅煉隂消陽長迷雲散杲日當天光輝滿十方明朗照見未生前師云初機之人可習養身安樂四法一齒要頻叩二津要頻嚥三髮要頻梳四氣要頻煉此乃小乘法也久久行之則却病延年身輕體潤内修者心上事少口中語少腹中食少夜間睡少聖母云如此四少神仙必了此也師至三郷光武廟有善士秦微靜參師問有中無者何師曰修行人雖有四大假合然在愛慾境中心上無纖毫塵念是也又是有相身中無相身妙體也祖師云有形是假無相是眞再問無中有師曰雖是心上無情意中無念不落頑空一點真性湛然不昧須要空中不空無裏生有古云虚無生白雪寂靜發黄芽再問動靜二字師曰動者心靜者性心生性滅心滅性現道人曰如何是性滅師曰客强主弱昧了本真也道人曰如何是心滅師曰主正邪避念滅情忘也師至福昌縣有坐圜者師往問曰先生何日出圜答曰倒了圜屋出也師曰圜屋若倒何處安身先生曰屋倒者比喻也師曰何須待零落然後始知空夫坐圜者非輕乃試仙舉之場號曰三靜關故經云小靜一百日中靜二百日大靜三百日須要識邪正不要着相古云凡所有相皆是虚妄百日内磨煉心中無絲毫塵翳要節飲食薄滋味敵魔戰睡調息綿綿精神内守入希夷域無何有鄉若得湛兮若凝久久自然結就虚無靈胎可以保養若養成至寳方可調神出殻從近至遠往來純熟要住則隨縁要去則脫殻矣不可在圜内百般紐捏見神鬼以爲眞久久則着魔祟也古云道無鬼神獨來獨往先師曰居圜守靜清靜道生靜極陽復久久養煉要得其中自然成道矣師至魯山度老菴有沈法師參問修行何處下手師曰下處不用手養則自然有修成無漏房便得長生壽夫初學人不離八法養體養胃養心養神養氣養精養性養智凡養體者要減重從輕養胃者節食薄味養心者少思寡慾養神者儉事勿窺養氣者息言緘口養精者少淫寡聽養性者安知勿思養智者沈靜默然此八法不可離也乃作詩曰修行不必向他尋只在心中七寳林識得玄關真一竅那時便得見天心師至安東州有道友高明遠參師問曰迴光返照此理如何師曰迴光者一念歸家返照者覺照已過迴光莫向外遊返照點檢自己儒云先覺後覺道云自覺勝如覺他自覺則無失錯覺他則迷本真須要時刻點檢攝念降心直至念無可念覺無可覺混俗而諸塵不染者方是道人也古云百花叢裏過一葉不沾身是也再問曰混俗豈得諸塵不染師曰水自動而山自靜天自閑而雲自忙從他世事紛紜我自如如心要主宰不隨物轉不被境瞞如何渾得自己真如也師至東海大伊山古佛陀寺與梁和尚語間有鐵牛和尚參師拜求指箇生死路頭教箇出身之處師曰有成有敗是生死路頭無去無來是出身之處鐵牛拜云終朝只在輪竿上不識蘆花對蓼紅師曰只這迴得過便是出身處放得下輪竿便離生死路頭又云不得東風花不開花開又被風吹落此者是生死路頭無雲生嶺上有月印江心此是出身之處吾今直言與汝若情忘念滅便是生門意亂心狂便是死路其心不與萬法爲侣一性孤明湛然獨照此乃出身之處仍作詩曰不滅不生性湛然無來無去出三千要知這箇翻身處踏破虚空透妙玄師至伊廬山重陽洞有菴主周道隆參師問坐鉢之理師曰鉢字者本也乃金本而成也金本者金情木性也情性相合以喻鉢也情者波也性者水也坐鉢者去情而定性也鉢中一小竅者乃昇降之義也有昇則有降有盈則有虧定鉢之時須緘口靜默正身端坐絶慮忘言此者教情性相合抱於一神也又敬菴秀才拜師問本來面目者何師曰不即此不離此若離此是本來面目者動靜語默四大六門動靜徧身互用者是誰若即此是本來面目者死人亦有四大六根如何不動且如父母未生之前無此四大六根何者是動靜覺箇甚麽道經云視不見我聽不得聞離種種邊名曰妙道釋云若以色見我以音聲求我是人行邪道不能見如來無相能生有相無形能制有形本來面目非五色可觀非五音可聽無目能觀無耳能聽無鼻能臭無舌能嘗無口能言無手能拳無足能走本體法身纔動便着六根靜定本來面目自現只今動者乃主使奴靜定主歸位昏迷散亂爲鬼湛明了爲神修行人要見本來面目者須是屏息諸縁六根清淨一心不二纖毫不立寸絲不掛自然迷雲消散性月呈輝也古云霧開日瑩塵淨鑑明乃作偈曰看後無形覺有形從來不惹一毫塵能將萬法皆抛棄顯出元初不壞身師至太白山安樂窩有講師陳弘道參師問莊子齊物篇中有言大知閑閑小知間間大言炎炎小言詹詹何也師曰大知閑閑者無不容受也小知間間者有間别也此蓋知之同大言炎炎者同是非也小言詹詹者小扁之貌此語言之異莫不只此四者差别萬物萬情取舍不同若有眞宰使之自然也要見眞宰麽咦咦雖然出入無蹤跡物物全彰見也麽有道士劉宗海參師問修煉者何師曰修者修其外行煉者煉其身心修外行者恤孤念寡敬老憐貧修橋砌路扶患釋難總有八百之數煉身心者居環守靜磨身煉心惜精養氣鍊神還虚總有三千之數外行生福内功生慧福慧兩全超越生死也又男子六十四歲不能修命者何也師曰人者萬物之靈壽本四萬三千二百餘日其神三萬六千元陽真氣本重三百八十四銖内應乎乾不知保養而致之散是以中道夭閼乾者六陽具而未知動作施爲知此修煉即神仙也自十五歲至二十五歲施泄不止則真氣虧四十八銖存者應乎姤嗜慾甚加十歲則又虧四十八銖存者應乎遯又不知保養更加十歲又虧四十八銖存者應乎否至此乃天地之中氣又不知修養更加十歲其虧七十二銖其應乎觀又不知補養更加五歲其虧九十六銖存者應乎剥又不知保養八八六十四卦元氣終矣中應乎坤坤者純隂也惟安穀氣而生故名苟壽人至於此去死不遠不復能修丹矣其或淺敗之甚者又不逮此而絶如老樹精微遇大風火燎其枯死必也凡修行人要識銖兩抽添下功祖師云一葫蘆三百八十四銖此之謂也有陳講師問尸解之道師曰尸解有五兵文水火太隂者是也兵解者如郭樸被戮於市周樸遭於鋸解文解者如長房般形於拄杖達磨隻履而西歸水解者馮夷溺於大川太白沉於江底火解者封子焚於火樹陸仙上於柴棚太隂解者視其色不變尸不青皮不皺目光不毁屈伸柔軟此亦尸解也肉皆百年不朽更起成人雖如是終不成天仙之道但得不死而已是歲丙寅九月師至華陽東嶽廟歇禪值雨屋漏乃作詩一首屋漏人不漏人忙我不忙移身安穩處俗念總相忘當月十五日全眞道人董孤雲王夷山何懶雲三人赴丹陽萬壽宫作主鉢即賦詩一首别衆而行深山幽谷是吾家受用平生實可誇瓦鉢常盛蜂蜜酒磁瓶時煑构芽茶閑來笑指天邊月悶後行觀澗畔花今日别辭諸友去遥瞻林壑謾咨嗟是時九月二十二日到長安丹陽萬壽宫有鄧指揮謁師曰久聞先生道矣師曰貧道居山養拙而已指揮曰只這拙字若能會養其道至矣師曰匿光藏輝見素抱朴雖辯無言雖巧如拙眼不觀色耳不聽聲口雖應事心固無欲心無其心念中無念此者余養拙之用也指揮請問性命二字何師曰性乃命之體命乃性之用用無體不明體無用不備根梢本相連權且分爲二指揮曰既是體用並行因何分二師曰性命本一因慾念離隔爲二古云木金間隔分烏兔是也指揮曰論性在道爲何物師曰即金丹比喻眞性亘劫常存出入無礙故比如金之堅如剛之利如丹之圓重陽帝君云本來眞性號金丹四假爲爐煉作團不染不思除妄想自然輥出赴仙壇此也次日大衆參畢師曰朽木免彫琢拙夫省役心辯不如訥巧不如拙石有玉而損石蛤懷珠而喪蛤誠無妄耳乃詩曰成材百尺青松不覺春風一送枝梢一任翻騰本來根深不動隨機應化録卷上
