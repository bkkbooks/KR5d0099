body:
  text: 無垢子隨機應化録序唱二陜有全真道者祖貫浙之四明人也父居錢塘而生何君道全君自幼修道號無垢子雲遊東海之上人未之竒也厥後西來終南居於圭峯之墟而道成人以為異碑有載焉洪武己卯孟春望後君卒於長安醫舍王公贈以羽化之儀禮葬羣仙之塋歲二載孫壽通子來以言而告曰曩與何君交之已久今已去世無復可見噫何君之心高哉復拜手而囑之乞文以冠其目豫慨然曰道不能顯諸於形容必紀敘其實行豫雖學陋必本諸於言而形容之是以今吉慕道之士者多不能有達於至道之趣而何君達性命之理行無為之教庸人俗子皆仰其化非其天性純篤何能若是歟賈道玄者何君之門人也齎藁以來不憚千里而必成於序非壽通子吾何為而作也然壽通子之道顯而何君之道亦顯若合符節自何君去後非壽通子正教無復可傳何君長於壽通子而壽通子敬禮之往矣而又彰之足可以知何君之德二人交契之深語録之作成於何君既沒之後其於教良有在焉時洪武辛巳年六月上浣日昆丘靈通子序
