front:
  text: 隨機應化録卷下唱三
  hash: sha256:c246a51cba89e629218e10b959ddbd298868367fd6a6f53a1e14fcce2939b6e6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0099_HFL_002-001a, image: hfl/0740/0740-074.png}
body:
  text: 松溪道人無垢子何道全述門人賈道玄編集或問牛皮董先生坐環之理師答曰先師有言環則一理傳授有殊環者乃返本還元之義不過靜功而已或曰法有三千六百門汝行何門師答曰得師之口訣不在三千六百數内或曰莫非旁門乎師答曰先師云四邊無壁落八面亦無門大道無邊際虚空難度量因學人有賢愚而生大小乘之法乃人心自生偏邪大道本無逆順或曰既無偏正焉有上中下三乘之理師云先聖在人賢愚不同根基深淺所以立此三法量人根基而接也且乘者載物之義譬如大車可載大器之物中車載中器之物小車載小器之物量人根基利鈍而提之此乃聖人隨機立教用則有三道即一也古云水流異派到海同源豈有差别之分或曰董先生坐環之理汝必知之師答曰先師曾言有死環活環之理死環者四面皆墻坐環者在内將門封閉不令出入按時送飯須安身絶念息氣調神百日而出有志者功多無志者反成疾病活環者以四大假合爲墻壁以玉鎖金關爲封閉令一點靈光在内刻刻不昧使神不離氣氣不離神内想不出外想不入鬧中取靜靜裏分明精神内守勿令外擾如此百日勝如死環千日死環者閉形不能養神縱制其心亦是强爲如籠閉猿如繩絟馬去籠繩依舊顛劣非是自然若能向境物上磨煉心地勝如外邊紐捏强爲或曰如何是境物上磨煉師曰見一切物類不愛則不着物見諸般境界不動則不逐境如是磨煉久久得入無心三昧定處不動不定處亦不動乃是眞靜眞定也或曰自古神仙亦有坐環者何也師曰先眞坐環非是不了因後人見景生情聞聲動念所以閉門百日使心不亂與後人作箇榜樣方便教人修煉功成返本還元且如達磨西來在少林寺蒙頭面壁九年接得神光法師且非未了皆是與後人作箇規矩或曰今人亦有蒙頭面壁如何不得了道師曰只知粧點外相不識其中就裏或曰如何是裏頭造化師曰蒙頭者教人納住念頭面壁者見如不見也又是背境向心觀道經云不見可欲使心不亂夫修行人須是眼不觀色耳不聽聲見如不見聽如不聞絶聲色除念慮只粧外相終成何濟吕祖師云打破虚空見便拏拏來最好作生涯不知衲被蒙頭趣笑煞西來舊作家語畢或曰前者汝言不在三千六百數内正是如何修養何處安爐立鼎何爲藥材何以水火煅煉何以成丹師答曰以乾坤爲爐鼎以精氣神爲藥材以靜定爲水以慧照爲火一意和合三寳宻宻爲丸混而爲一久久不散即成丹矣只這一也是眼中添屑和一除去方可合道李清菴先生詩云撑天柱地太糢糊只許元神在裏居若向此中留一物豈能證道合虚無或曰如是莫不落空了師曰既有覺照如何空得或曰若覺照莫不逐境着物師曰雖然燈光徧照本來燭不離臺乃作詩一首萬籟風鳴本没情千江月照一般明境物從來無染着山自巍巍水自行或曰如何是道師云五行不到處一氣未生前是也又曰修行之人何處是師曰善惡兩忘處一念未生時湛然寂然即契道矣又曰如何修養得到這地位師曰須要體用相兼又曰何爲體用師曰道之用要安人利物道之體須無爲清靜若能降伏心念不起自然清靜無爲凡事不動其念毁讚不生嗔喜無過此乃是守道也又問曰天堂地獄之事有無否師曰天堂無則已有則君子登地獄無則已有則小人入道經云生前無刑囚之憂身後不淪没之苦當今聖治賞善罰惡則乃是天堂地獄矣古聖人千經萬論忠孝爲先天上人間方便第一送火筯與師乃回頌曰火筯一雙渾身是鋼驀直穿過同與行藏不離爐竈來往相將抽添攢簇烈焰熒煌辟盡幽隂煉就純陽投火不壞入水不妨撥開灰燼全身現忽然大地放毫光又詩曰爐竈中間好立身莫教傍壁落埃塵猛然撥着埋藏火普天匝地煖如春師至靜室有僧聦都參師問曰假若有一女子迎面而來看爲女子看爲男子乎師曰此是古語公案要你自參自悟吾若開解難做功夫其僧再三請解師叱曰看作女人着境相看作男子無眼目真性本無殊着相生分别背境向心觀自然萬事徹師又叱曰學落花流水去其僧不語師曰見如不見焉知男女心若無心焉有罪福大道不分男女你别辨做甚經云一體同觀猶自着相活潑潑地過去應事若風鳴萬籟鑑物似月照千江若此之人乃高士也僧謝而别師在靜室有何御史訪師問曰老師坐靜功夫若何答曰養拙而已御史曰百無所能謂之拙似此如何修得仙道師曰予養拙者乃傚古朴之拙也是志誠守分無爲自然雷經云用誠似愚用默似訥用柔似拙此也使返朴歸根復命知白守黑能生智慧出離生死能成仙佛也豈比百無所能之拙哉御史再問曰心靜勝如室靜境忘不若心忘又要靜位何用師曰碧天秋夜月無雲月更明且室靜則外魔不入心靜則内魔不起内外清靜表裏瑩徹乃是道人活計太上曰不見可欲使心不亂仙眞云外境不侵内神自定此之謂也御史又問曰道經云不失其所者久此理何也師曰此理有三宰輔士庶修行人各有所得處如若不失即得久長也且宰輔者忠君利國恤軍愛民公正無私剛柔兼濟不失其所即得爵禄久長也爲士庶者懼國法明人倫治勤克儉不失其所即得家道久長也修行人囂塵不染世俗無干一心清靜三寳混融不失其所即得身命久長也且各人身中有金樓玉室靈臺絳宫宻户生門玄關丹闕若不自修漸至倒塌主人無處安居是失其所也御史又問曰死而不亡者壽何也師曰且修行人臨行之際氣盡而道氣不盡身死而眞性不亡巍巍獨立湛湛若凝境物不能引造化不能拘不轉輪迴逍遥自在亘古長存此者乃無窮之壽也常人則不然色身有限天命有期四大分張一真散亂被日前愛境所搬造化推遷作主不得引入胞胎隨業受報輪迴往來不能停息所以不能久長也先師云色身數限有盡法身久遠無窮認得生前面目依然明月清風姬眞人云形可忘天真不忘不忘者乃不死不生之壽也釋氏云凡相滅時性不滅眞如覺體離塵埃了悟斷常根果别此名佛眼見如來此等之壽無有窮盡然人不修不能到此地也御史作禮而别有鄧指揮遣李校尉送紫竹杖與師乃回頌一首黄芽從地長翠葉苦天凉皮膚渾似漆心内勝如霜節透虚空界根蟠古道場賢哉親採得智者敢承當入水知深淺登山有主張打開生死路驀直入仙鄉李校尉受詩頌拜而問曰昔日誌公和尚因何於拄杖上掛拂子剪刀尺何也師曰此是不語禪亦乃譬喻示人自參自悟予今語汝且拄杖者非手中之拄杖比人身中之主宰剪尺者只是教人時時點檢度量自己心中長短不齊整處疾速剪去拂者拂去心上念慮也此箇功夫全在拄杖上莫向外求若是外說即非正道若無念慮揮拂若無長短裁截那剪尺拂子全然無用也惟有拄杖常存古云青天雲霧散獨顯一輪孤師作鷓鴣天詞一首誌公不是凡和尚拂尺剪刀懸拄杖聖僧怎肯度量人都在各人心地上這消息堪倚杖收拾歸家由縱放度量不齊須剪除拂淨塵埃性珠亮歲戊辰八月望後日師迴至華陽峪望鄉臺入靜百日出環乃作詩曰百日功夫妙更玄畧將消息向人傳木龍助起離宫火金虎來跑坎北泉四大能將爲爐冶三尸善把鼎中煎煉就一團無價寳神光射透九重天師至長安北關元君祠坐靜有人譏師爐鼎已老師笑乃作詩曰莫言爐鼎新與老只在自家真實討虚中採得紫靈芝便是長生不死寳師出環作詞無夢令二首百日如磨寳鏡塵盡清光徹瑩照見本來真有路通玄達聖真靜真靜自有神明表正又百日功夫了徹打開已先關結冷地一聲雷海底紅光焰烈合别合别玉館瓊樓添雪師在元君廟有西蜀海福禪僧參師問曰昔日有僧問東門三轉語云世尊在靈山會上拈花示衆迦葉微笑果是如何東門云賣金逢着買金人其僧云假若都笑若何東門云作箇普同供養僧云假若都不笑若何東門云留得行貨在須有便錢使請問此如何說師曰且東門老他本慈悲你自迷惑世尊拈花是親手分付迦葉微笑是覿面承當若都笑乃是法平等無有高下又云草木盡明圓覺性山河普現法王身若都不笑即江河徹底凍水泄不通流又云白雲歸洞府長天共一色僧悟禮謝師至華陽嶽廟有善士張秉彝參師呈西江月一詞云父母愛慾一點隂陽造化身軀被他搬弄數年餘未得全身歸去今日遇師指教往日空費功夫言下一悟嘴盧都全藉神明佑護師乃賡云不昩眞靈一點從他仙骨凡軀是誰搬弄數年餘不識强言來去未悟求師指教了了何用功夫心休不必嘴盧都自己神明暗護師在華陽靜室有客問曰飲酒不醉者如何師答曰性有主宰酒不能亂客又問曰筵宴動音樂者何師曰樂者樂也乃歡悅開五臟而舒暢也孫眞人養生篇云脾家好音樂聞之則脾磨客又曰世樂與仙樂同否師曰世樂者乃宫商角徵羽鄭衛之音也亂其耳動其情仙樂者是物外之清音正其心定其神聽世樂則放蕩婬邪聞仙樂則和氣頤眞客又曰何謂仙樂師云無孔笛無絃琴此樂不鼓舞而自鳴不吹嘘而自聲太上云五色令人目盲五音令人耳聾目盲何以翫太虚耳聾何以聞仙樂客喜作禮問曰世人作樂道人作樂乎師云世人乃放蕩之樂道人即真歡真樂非放肆也仙真云真樂真歡飲醍醐不須沽高唱無聲曲師作詩曰世樂非真樂仙音有妙音世樂人偏喜仙音神最欽世樂有窮盡仙音無古今賢人聽仙樂須是合天心或曰内丹之藥煅煉工夫師曰用精氣神三味使文武火煅煉不可太過不可不及須要停當子母相守歸于黄房乃作詩曰藥用三般物收歸鼎内煎煉成無價寳皎潔掛長天師遊處所詠詩詞歌讚戒世詩世途泥水大失脚便遭傷拄杖休輕放步履要隄防常行平正道休臨陡峻崗無隂樹下坐不扇自清凉示衆四大如房屋六門也要堅梁端基址正墻壁更完全狂風吹不倒慧燭鎮長然主人開正眼便見洞中天題錦屏山錦屏常有四時春不染人間半點塵聖湫退水天行雨神風起處冷侵人青松翠栢爲知友明月清風作近鄰閑來靜坐忘機處不覺神遊到紫宸三教一源道冠儒履釋袈裟三教從來總一家紅蓮白藕青荷葉緑竹黄鞭紫笋芽雖然形服難相似其實根源本不差大道真空元不二一樹豈放兩般花勸勉休誇精細逞僂儸僂儸使盡復如何日當卓午猶低下月過中秋漸次那正在崢嶸尋出路莫教蹭蹬落風波玉堂金谷成何用到頭赤洒一身多自詠山居老拙禮多村麄言細語不堪論眼界雖昏心不昧耳根然鬧性難渾恬澹家風偏有味清虚境界果無痕秖因吸盡虚空髓得見當初元始尊行生鐵拄杖手中拖兩脚無拘信步那白雲本是無心物往來豈怕遠山多住善惡雙忘事不干無來無去湛然安其間一點眞如相爍爍光輝不受瞞坐巍巍不動自清閑留得功夫養内顔非是死灰并槁木一輪皓月照家山卧放下四大得安然兩脚長舒睡不顛近來學得希夷法半夜三更日在天指迷牛兒犇走遍山川智力調柔緩緩牽待得回頭賔伏後安然養種在丹田又猿兒沈睡不須牽良馬歸來真用鞭固守金欄好收養自然化作紫金蓮又這點靈光本不移只因着憶墮泥犂若能放下無塵垢性月高懸照祖基又若還捉住太虚空頭頭物物總相逢撒手那邊人不到超然獨步妙高峰餅剥去皮膚白似銀隂陽煅煉兩調均請君見面休空過免作尋常飢餓人栗蒭如刺蝟葉如藍不許時人造次餐直待虚空開笑口自然輥出紫金丹網兜不存涓滴不招風提起分明竅竅通因師結就渾身眼繩繩貫串太虚空照路燈週圍紙護竹編成當中點起甚分明四面八風吹不入照見長安道上人黑豆爆默地翻身跳出來不教灰火久沈埋黑漆布衫全脫下黄金體相出形骸搧風袋心内虚空便氣通不勞吹力自生風匠手掌中輕扇動焰焰爐内自通紅觸窗蠅求出尋光觸紙飛不能透過轉狐疑若肯回頭還舊路豁然便有脫身時撲燈蛾爲愛紅光着意投焦身爛翅尚無休退步便有清凉處爭奈旋飛不轉頭拂子時時不離親手内刻刻常居掌握中一拂了然無王穩坐太虚空清凉傘一朵青雲上蓋張行步不離手擎將看他冒暑紅塵客有者身心得自凉鞋步步常隨大道行不蹅泥水共深坑忽然踏着家鄉路脫下安然了此生迎仙客出家兒要心堅訪道參禪早向前休懶惰莫改遷百年光景霎時容顔變既出家早求玄莫戀浮華被業牽降意馬鎖心猿清虚寂靜得見元初面學道人聽我言休睚明年又後年急下手鍊汞鉛金丹成就得步長生殿混元珠人人有不遇明師難下手被塵蒙怎判剖得來免了累刦殃和咎混元珠人少識只爲自家生荆棘業縁深難用力請君尋師早早求消息這顆珠不染塵十二時中不離身憑功行養氣神忽然迸出三界光輝映滿庭芳這點心燈風吹難滅亘今亘古常明愚昧不見幽暗不能行不用清油黄蠟能剔起普照分明君知否皆因着境迷了本來程我今纔說破休教外覓内治均平慧風起處雲散天晴杲杲紅輪徧照隂魔滅大道圓成常晃耀破除黑暗普救衆羣生喜遷鶯圓明本具奈愚人不省自迷自誤執着塵情轉生顛倒那肯抽身回顧本來這點靈光箇箇不知出處迷真趣把荆棘錯認靈椿覺樹迷了長生路展轉沈淪何日心開悟今日朱顔來朝難保不可等閑虚度急急下手尋眞莫被纖塵染污心堅固長安大道必然穩步修真養命歌付語玄門學道子火急回頭救自己百歲光隂反掌間撇下皮囊何依倚失陽神作隂鬼輪迴販骨無停止自家性命非等閑休得將身輕棄死甚爲性甚是命神氣兩般爲本柄收拾歸來做一家不久默默通賢聖修真法也無多只要忘機煉睡魔靜定惺惺神不昧養成真體出娑婆養命訣要忘言如籠蒸物莫教掀下面陽火休斷絶漸入長生不死門精比油光比神氣比燈焰盞比身油滿焰輝澄心正分明照見剔燈人若廢一便不然黑洞洞地過流年來到寳山空手去失却當初買命錢惺惺漢聽我說和合一處無令缺煉就金丹千日功生死輪迴皆透徹脫凡軀换仙骨金毛獅子迸出窟一道威光爍太虚不與狐狸同出没法王種子也非難狐狸之輩隔千山敬信賢才試拈看將來必定列仙班自歎歌自從脫俗出塵時心心念念常如一誓願玄門有悟期愛海之中救沈汨初出家難下手放放蕩蕩來往走秪道身閑便是道豈知倒惹來生咎猛靜思忽參透教門粥飯難消受既是出家要了心心不了時還依舊志本堅念又切尋師訪道無休歇正遇中秋夜深時蒙師對我叮嚀說謝明師指過日輕輕快快行真實似此優游度歲年終未得箇長生術涉山川常戚戚直要求箇真端的驀然信步到蕭山幸遇白雲師父識耳邊言轟霹靂暗地試來便得力從前事業盡掀翻再後更不他方覓行也好坐也好行住坐卧無煩惱二十餘年作貧子今朝拏住身中寳紙屏風全打破逍遥自在隨縁過從他紐捏百千般饑來喫飯困來卧自思惟昔日言欲將妙典作舟船爭奈許多沈水漢隨波逐浪實堪憐不回頭難提挈薄福無縁業不徹此舟過了更無船他日茫茫風浪别空費紙空饒舌無箇男兒肯决烈只求口嘴不依行尋思眼中空滴血何無垢何無垢不如歸去合着口待得因縁會遇時從空再展拏雲手休休休罷罷罷善惡一筆都勾下爭如保養自家珠留得光明神鬼怕再省言再省說免得區區費唇舌尋思世上少知音且向幽巖守愚拙數載絲綸今日收輕輕撥轉釣魚舟一任洪波風浪生蘆花深處且藏頭慵懶歌古今世事都參破所以教予心懶惰任君名利往來忙更不抬頭覷那箇你自忙我自坐從他來往如推磨忙人誰肯放心閑閑中自有真功課非是懶我愛簡時人笑我多單板祗因單板得安然烈破項門開正眼勤處懶懶上勤雖然同世不同羣每日河車搬運轉三關一撞氣氤氲正道行邪僻止他人愛處我不喜我今行處誰肯行你若肯行契天理不修外祗求内如蚌隱珠明似昧一朝蛤破出塵埃現出光輝無障礙動中靜靜中動恍惚豁開白玉洞迷雲散盡月當天捉住虚空顛倒弄行也閑坐也閑行住坐卧得開顔時人笑我多痴懶因懶跳出是非關道無言本無說因此韜光學愚拙用巧不如藏巧妙留得光明常不滅外明不若裏頭明保養完全道自成待得一聲春霹靂透過蓬萊十萬程讚道德真經道德眞經字五千行行句句妙通玄學人達得如斯理不用乘鸞上九天讚法華妙典六萬餘言字字明光輝三界破幽冥學人若要超生死盡在蓮華七卷經又這卷真經妙法華三車火宅喻偏嘉掃除糞穢明珠現翻身便到法王家讚清靜經太上金口義玄眞明開妙道絶纖塵學人依教忘情後便是蓬萊洞裏人讚般若心經這卷心經本在心迷人枉向外邊尋若能放下全無礙霎時大地變黄金别衆八十年間幻化身今朝歸去脫凡塵稽首玄門諸道友各人寧耐保全真辭世四大假合本非堅暫來塵世結人縁今朝縁盡歸空去何日重將古教傳冰泮雪消還是水形亡神去復同玄有人更問家何處依舊還歸象帝先隨機應化録卷下
